# bazzite-tower smartd configuration — proactive NVMe health monitoring.
#
# No MTA is configured on this image, so smartd logs warnings to the system
# journal (its default when no -m mailer is given). Inspect with:
#     journalctl -u smartd
#
# Both M.2 slots hold NVMe drives (one is a Samsung 990 EVO Plus). They are listed
# explicitly rather than via DEVICESCAN so the intent is documented and a scan miss
# can't silently drop monitoring. NOTE: when a DEVICESCAN directive is present,
# smartd ignores every other directive — so this file deliberately does not use it.
#
# Directive flags:
#   -a               standard monitoring set: health (-H), error/media-error log
#                    (-l error), failed "Usage" attributes incl. available-spare /
#                    reallocated equivalents (-f), self-test log, temperature.
#   -s L/../../6/03  long self-test weekly, Saturday 03:00 — on drives that support
#                    NVMe self-tests; smartd logs and keeps monitoring if a drive
#                    doesn't.
#   -W 4,45,55       temperature: warn on a 4 C jump, info at 45 C, critical at 55 C.
# (-m mailer is intentionally omitted; warnings go to syslog/journal.)
/dev/nvme0 -a -s L/../../6/03 -W 4,45,55
/dev/nvme1 -a -s L/../../6/03 -W 4,45,55
