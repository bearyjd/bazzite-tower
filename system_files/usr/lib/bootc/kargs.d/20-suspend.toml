# Pin the suspend mode to s2idle on this hardware. Meteor Lake has no working S3
# ("deep") suspend — the firmware either omits it or exposes a broken one — and
# defaulting to deep caused resume "bounce" plus i915 PHY A / C10 (cx0) PLL state
# corruption: ~30s of flip_done timeouts and a sluggish display after wake.
# (Earlier this fragment set mem_sleep_default=deep on the theory that deep gave a
# cleaner cycle; on MTL that was wrong, so we pin s2idle explicitly instead.)
#
# Pinning s2idle (rather than just dropping the karg) is deliberate: it documents
# the intent in the image and prevents any firmware that *does* advertise a broken
# S3 from selecting it. Verify the live mode after boot with
# `cat /sys/power/mem_sleep` — the bracketed entry is active.
#
# Baked the bootc-native way (see 00-iommu.toml): bootc reads
# /usr/lib/bootc/kargs.d/*.toml and applies these at install and on every upgrade.
# Kept as its own fragment, separate from the i915 display flags, because suspend
# mode is an independent concern and so it can be changed or removed on its own.
kargs = ["mem_sleep_default=s2idle"]
