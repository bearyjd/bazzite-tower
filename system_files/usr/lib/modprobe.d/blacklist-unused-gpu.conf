# Lean-boot optimization (safe to revert: delete this file).
#
# This ThinkPad P1 Gen 7 has an Intel Arc iGPU (i915) and an NVIDIA dGPU — there is
# no AMD graphics silicon. The amdgpu / amdxcp modules still autoload and probe for
# hardware that isn't present. No display path depends on them: external and
# DisplayPort-alt outputs on this machine are driven by the Intel iGPU through the
# USB-C / Thunderbolt controllers, never by amdgpu. So blacklisting amdgpu cannot
# break any output here. (amdxcp depends on amdgpu and won't load without it; it is
# listed too for clarity.)
#
# `blacklist` stops udev/alias autoload. If amdgpu still appears after this (i.e.
# it's embedded in the initramfs), the stronger lever is the kernel arg
# `rd.driver.blacklist=amdgpu` — kept out of band here to stay a pure, revertible
# module config.
#
# `xe` (the newer Intel GPU driver) is intentionally NOT blacklisted: i915 is the
# active display driver on this Meteor Lake panel (the image tunes i915), but xe
# may back compute or other paths, so leaving it loaded is the conservative choice.
blacklist amdgpu
blacklist amdxcp
