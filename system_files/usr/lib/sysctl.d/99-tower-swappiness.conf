# Reduce swap eagerness. This box runs zram swap and was seen pushing ~10 GiB into
# zram while physical RAM was still free — wasting CPU compressing pages that never
# needed to leave RAM. Lower swappiness so the kernel prefers reclaiming page cache
# over swapping anonymous pages until memory pressure is real.
#
# Image-owned default in /usr/lib/sysctl.d; a user can override at
# /etc/sysctl.d/. Numeric-99 prefix so it wins over lower-numbered base drop-ins.
# Verify live with `sysctl vm.swappiness`.
vm.swappiness = 10
