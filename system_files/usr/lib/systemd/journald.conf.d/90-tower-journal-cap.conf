# Cap the persistent systemd journal at 500 MiB.
#
# The default SystemMaxUse is 10% of the filesystem — on this 7.3 TiB box that's
# ~730 GiB, so a log storm (e.g. the SOF audio retry loop that wrote 94k+ lines
# per boot, or a crash-looping unit) can balloon the journal to multiple GiB
# before old entries age out. journald enforces SystemMaxUse continuously: it
# vacuums older journal files on every rotation to stay under the limit, so this
# replaces any need for a periodic `journalctl --vacuum-size` cron/timer.
#
# Verify live with `journalctl --disk-usage`. Override at /etc/systemd/journald.conf.d/.
[Journal]
SystemMaxUse=500M
