# WirePlumber 0.5.x drop-in — bound the blast radius of a SOF sink that can't
# activate. Defense-in-depth only: the actual fix for the ABI-3.23-vs-3.29
# mismatch is the alsa-sof-firmware pin in build_files/build.sh. This file makes a
# *future* topology/kernel regression degrade to one dead audio route instead of
# the storm we saw (94k+ "FW reported error: 9" + 95k+ snd_pcm_prepare errors in a
# single boot, after which PipeWire set the card profile to off and audio died).
#
# Mechanism (verified against the shipped scripts/node/suspend-node.lua in
# wireplumber 0.5.14): that hook fires on node-state-changed for the "error" and
# "idle" states and suspends the node after `session.suspend-timeout-seconds`
# (default 5). When a SOF PCM fails snd_pcm_prepare it goes to "error"; lowering
# the timeout for the SOF/HDA card lets the node settle into a suspended state
# sooner instead of being re-activated for the full default window. It does not by
# itself stop a tight relink loop — only a kernel/firmware ABI match (the pin)
# does — but it shortens the window and is the supported WirePlumber lever.
#
# Scoped to the on-board Intel HDA/SOF analog card by node name so working audio
# elsewhere keeps the stock 5s idle-suspend behaviour (no resume clicks).
monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*sof.*" }
      { node.name = "~alsa_input.*sof.*" }
      { node.name = "~alsa_output.*hda.*generic.*" }
      { node.name = "~alsa_input.*hda.*generic.*" }
    ]
    actions = {
      update-props = {
        # Suspend the failed/idle SOF node after 1s instead of the default 5s.
        session.suspend-timeout-seconds = 1
      }
    }
  }
]
